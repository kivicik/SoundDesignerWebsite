<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kıvanç Nadir — Resume</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #111; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
        .toolbar {
            background: #000;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .toolbar a.home { color: #aaa; text-decoration: none; font-size: 13px; }
        .toolbar a.home:hover { color: #fff; }
        .toolbar a.download {
            background: #fff;
            color: #000;
            text-decoration: none;
            font-size: 13px;
            font-weight: 700;
            padding: 6px 16px;
            border-radius: 3px;
        }
        .toolbar a.download:hover { background: #ddd; }
        embed {
            flex: 1;
            width: 100%;
            border: none;
        }
        .fallback {
            display: none;
            flex: 1;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px;
            color: #aaa;
            font-size: 15px;
        }
        .fallback a { color: #fff; }
    </style>
</head>
<body>
    <div class="toolbar">
        <a class="home" href="/">← kivancnadir.com</a>
        <a class="download" href="/resume/KivancNadir_Resume.pdf" download>Download PDF</a>
    </div>
    <embed src="/resume/KivancNadir_Resume.pdf" type="application/pdf"
           onerror="this.style.display='none';document.querySelector('.fallback').style.display='flex';">
    <div class="fallback">
        <p>PDF preview not supported in this browser.</p>
        <a href="/resume/KivancNadir_Resume.pdf" download>Download Resume</a>
    </div>
</body>
</html>
